<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <base target="_top">
    <title>アプリ一覧</title>

    <!-- OS判定：描画前に表示する側を確定（Android以外はすべてiOS表示） -->
    <script>
        (function () {
            var isAndroid = /android/i.test(navigator.userAgent);
            document.documentElement.classList.add(isAndroid ? 'is-android' : 'is-ios');
        })();
    </script>

    <!-- Androidのフィーチャーグラフィック（差し替える場合はここを編集） -->
    <script>
        window.FEATURE_GRAPHICS = {
            motitan: 'https://play-lh.googleusercontent.com/N9ZsQzNfc-SVjbxuetnMFvxKF-ckPD78WUGgCPno09_FAdyWqx1QCXiCbOFz5j6L-HCIqlcV4eJDn05Tvg43=w832-h470-rw',
            motispi: 'https://play-lh.googleusercontent.com/tInM0nIU4aa9EaYxBz46RMpc9BG3gU7aYye8EKUs_sy_8kcWtL-Jt6orMP8CuSte2Gpw07vk6hFC4qfnQ0Pu4w=w832-h470-rw'
        };
    </script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; }

        /* 表示の出し分け（描画前にクラスが付くのでチラつかない） */
        .ios-page, .android-page { display: none; }
        .is-ios  .ios-page     { display: block; }
        .is-android .android-page { display: block; }

        /* =========================================================
           iOS（App Store風）
        ========================================================== */
        .ios-page {
            --bg: #ffffff;
            --fg: #1d1d1f;
            --fg-2: #6e6e73;
            --hairline: #d2d2d7;
            --pill-bg: #e8e8ed;
            --pill-bg-h: #d8d8de;
            --accent: #0071e3;
            --icon-edge: rgba(0,0,0,0.09);
            background: var(--bg); color: var(--fg);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                         "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        @media (prefers-color-scheme: dark) {
            .ios-page {
                --bg: #000000;
                --fg: #f5f5f7;
                --fg-2: #86868b;
                --hairline: #2a2a2c;
                --pill-bg: #1c1c1e;
                --pill-bg-h: #2c2c2e;
                --accent: #2997ff;
                --icon-edge: rgba(255,255,255,0.10);
            }
        }
        .ios-page .wrap {
            max-width: 692px; margin: 0 auto;
            padding: calc(28px + env(safe-area-inset-top)) 20px
                     calc(40px + env(safe-area-inset-bottom));
        }
        .ios-page .section-title {
            font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 6px;
        }
        .ios-page .app-row {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 0; border-bottom: 0.5px solid var(--hairline);
            text-decoration: none; color: inherit;
            opacity: 0; transform: translateY(8px);
            animation: rise .5s cubic-bezier(.22,.61,.36,1) forwards;
        }
        .ios-page .app-list .app-row:last-child { border-bottom: none; }
        .ios-page .app-row:nth-child(1) { animation-delay: .04s; }
        .ios-page .app-row:nth-child(2) { animation-delay: .12s; }
        .ios-page .icon {
            flex: 0 0 auto; width: 64px; height: 64px; border-radius: 15px;
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 0 0.5px var(--icon-edge);
            display: grid; place-items: center; font-size: 26px; font-weight: 700; color: #fff;
        }
        .ios-page .icon--motitan { background-image: linear-gradient(145deg,#ff8a3d,#ff5e3a); }
        .ios-page .icon--motispi { background-image: linear-gradient(145deg,#34c1ff,#0a84ff); }
        .ios-page .meta { flex: 1 1 auto; min-width: 0; }
        .ios-page .meta .name {
            font-size: 17px; font-weight: 600; line-height: 1.25;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .ios-page .meta .cat { font-size: 15px; color: var(--fg-2); margin-top: 3px; }
        .ios-page .get-btn {
            flex: 0 0 auto; min-width: 74px; text-align: center; white-space: nowrap;
            font-size: 15px; font-weight: 700; letter-spacing: 0.01em;
            color: var(--accent); background: var(--pill-bg);
            border: none; border-radius: 16px; padding: 7px 18px; cursor: pointer;
            transition: background .15s ease, transform .1s ease; text-decoration: none;
        }
        .ios-page .app-row:active .get-btn { background: var(--pill-bg-h); transform: scale(.96); }
        @media (hover:hover) { .ios-page .get-btn:hover { background: var(--pill-bg-h); } }

        /* =========================================================
           Android（Google Play風 / ライト固定）
        ========================================================== */
        .android-page {
            --bg: #ffffff;
            --fg: #202124;
            --fg-2: #5f6368;
            --hairline: #e8eaed;
            --hover: #f5f6f7;
            --cover-bg: #f1f3f4;
            --accent: #01875f;
            --accent-h: #00674a;
            --icon-edge: rgba(0,0,0,0.07);
            background: var(--bg); color: var(--fg);
            min-height: 100vh;
            font-family: "Roboto", -apple-system, BlinkMacSystemFont,
                         "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .android-page .wrap { max-width: 1000px; margin: 0 auto; padding: 26px 24px 64px; }
        @media (max-width: 640px) { .android-page .wrap { padding: 18px 14px 48px; } }
        .android-page .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 8px;
        }
        .android-page .card {
            display: block; text-decoration: none; color: inherit;
            border-radius: 12px; padding: 14px; transition: background .15s ease;
            opacity: 0; transform: translateY(10px);
            animation: rise .5s cubic-bezier(.22,.61,.36,1) forwards;
        }
        .android-page .card:nth-child(1) { animation-delay: .04s; }
        .android-page .card:nth-child(2) { animation-delay: .12s; }
        @media (hover:hover) { .android-page .card:hover { background: var(--hover); } }
        .android-page .card:active { background: var(--hover); }
        .android-page .cover {
            width: 100%; aspect-ratio: 832 / 470; border-radius: 12px; overflow: hidden;
            background: var(--cover-bg); box-shadow: inset 0 0 0 1px var(--icon-edge);
        }
        .android-page .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .android-page .row { display: flex; align-items: center; gap: 14px; margin-top: 14px; }
        .android-page .icon {
            flex: 0 0 auto; width: 48px; height: 48px; border-radius: 10px;
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 0 1px var(--icon-edge);
        }
        .android-page .meta { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }
        .android-page .meta .name {
            display: block; max-width: 100%;
            font-size: 15px; font-weight: 500; line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .android-page .update-btn {
            flex: 0 0 auto; font-size: 14px; font-weight: 500; white-space: nowrap;
            color: #fff; background: var(--accent);
            border: none; border-radius: 20px; padding: 9px 20px; cursor: pointer; text-decoration: none;
            transition: background .15s ease, transform .1s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.18);
        }
        .android-page .card:active .update-btn { background: var(--accent-h); transform: scale(.97); }
        @media (hover:hover) { .android-page .update-btn:hover { background: var(--accent-h); } }

        @keyframes rise { to { opacity: 1; transform: none; } }
    </style>
</head>
<body>
    <!-- ================= iOS ================= -->
    <div class="ios-page">
        <main class="wrap">
            <h2 class="section-title">アプリ一覧</h2>
            <div class="app-list">
                <a class="app-row" href="https://apps.apple.com/jp/app/id6761979905">
                    <span class="icon icon--motispi" data-appid="6761979905">話</span>
                    <span class="meta">
                        <span class="name">AI英会話モチスピ</span>
                        <span class="cat">教育</span>
                    </span>
                    <span class="get-btn">アップデート</span>
                </a>
                <a class="app-row" href="https://apps.apple.com/jp/app/id6451048056">
                    <span class="icon icon--motitan" data-appid="6451048056">単</span>
                    <span class="meta">
                        <span class="name">英単語モチタン</span>
                        <span class="cat">教育</span>
                    </span>
                    <span class="get-btn">アップデート</span>
                </a>
            </div>
        </main>
    </div>

    <!-- ================= Android ================= -->
    <div class="android-page">
        <main class="wrap">
            <div class="grid">
                <a class="card" href="https://play.google.com/store/apps/details?id=jp.astran.motitan_production">
                    <div class="cover">
                        <img id="fg-motitan" loading="lazy" alt="英単語アプリ モチタン"
                             src="https://play-lh.googleusercontent.com/N9ZsQzNfc-SVjbxuetnMFvxKF-ckPD78WUGgCPno09_FAdyWqx1QCXiCbOFz5j6L-HCIqlcV4eJDn05Tvg43=w832-h470-rw">
                    </div>
                    <div class="row">
                        <span class="icon" style="background-image:url('https://play-lh.googleusercontent.com/tHH4jw3bEubr1lULJGGtVeseKiLG4Rzd-v591BHPcfSQlqoMv21tqrPGszVfcoMvjK5GTODXHOcZdlf4uKbR=s128')"></span>
                        <span class="meta">
                            <span class="name">英単語アプリ モチタン-TOEIC/英検/中学/高校/小学生</span>
                        </span>
                        <span class="update-btn">アップデート</span>
                    </div>
                </a>
                <a class="card" href="https://play.google.com/store/apps/details?id=jp.astran.motispi_production">
                    <div class="cover">
                        <img id="fg-motispi" loading="lazy" alt="AI英会話モチスピ"
                             src="https://play-lh.googleusercontent.com/tInM0nIU4aa9EaYxBz46RMpc9BG3gU7aYye8EKUs_sy_8kcWtL-Jt6orMP8CuSte2Gpw07vk6hFC4qfnQ0Pu4w=w832-h470-rw">
                    </div>
                    <div class="row">
                        <span class="icon" style="background-image:url('https://play-lh.googleusercontent.com/yOkUaZqR2qSOqtd8VjYtJ6wd38NCFZayFKlPQNeJi3ago9MSedr_7loQ4k5Oo5pIQZzbTN2aojhkZ7ZtBzbpvVs=s128')"></span>
                        <span class="meta">
                            <span class="name">AI英会話モチスピ - スピーキング/リスニング/英検二次</span>
                        </span>
                        <span class="update-btn">アップデート</span>
                    </div>
                </a>
            </div>
        </main>
    </div>

    <script>
        var isAndroid = document.documentElement.classList.contains('is-android');

        if (isAndroid) {
            // Androidのフィーチャーグラフィックを設定値で差し替え
            var fg = window.FEATURE_GRAPHICS || {};
            if (fg.motitan) document.getElementById('fg-motitan').src = fg.motitan;
            if (fg.motispi) document.getElementById('fg-motispi').src = fg.motispi;
        } else {
            // iOSはApp Storeの実アイコンをiTunes公式APIから取得して反映
            window.__appIcons = function (data) {
                (data.results || []).forEach(function (r) {
                    var el = document.querySelector('.icon[data-appid="' + r.trackId + '"]');
                    if (!el || !r.artworkUrl100) return;
                    var url = r.artworkUrl100.replace(/\/\d+x\d+bb\./, '/200x200bb.');
                    var img = new Image();
                    img.onload = function () {
                        el.style.backgroundImage = "url('" + url + "')";
                        el.textContent = '';
                    };
                    img.src = url;
                });
            };
            var s = document.createElement('script');
            s.src = 'https://itunes.apple.com/lookup?id=6451048056,6761979905&country=jp&callback=__appIcons';
            document.head.appendChild(s);
        }
    </script>
</body>
</html>
